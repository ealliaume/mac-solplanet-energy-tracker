name: Release

# Fires on a pushed `vX.Y.Z` tag (see scripts/publish-release.sh, plan §3/§3.1).
# Builds the ad-hoc-signed .app, publishes a GitHub Release carrying
# `Solplanet-Energy-Tracker.zip` + `.sha256`, then bumps the Homebrew cask in
# ealliaume/homebrew-tap. The asset name is the contract shared by this
# workflow (`files:`), the cask (`url`), and UpdateChecker.defaultDownloadAssetName.

on:
  push:
    tags:
      - 'v*.*.*'

# softprops/action-gh-release@v2 still ships a Node 20 entrypoint; opt it into
# the Node 24 runtime so it survives the June 2026 deprecation. checkout@v5 is
# already Node 24 native.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  release:
    name: Build and Release
    runs-on: macos-15
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode 26
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            echo "No Xcode 26.x found on runner. Available:"
            ls -d /Applications/Xcode*.app
            exit 1
          fi
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

      - name: Show build environment
        run: |
          xcodebuild -version
          swift --version
          echo "macOS: $(sw_vers -productVersion)"
          echo "Tag: ${{ github.ref_name }}"

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Strip SwiftLint plugin for CI build
        run: |
          # SwiftLintPlugins fails on CI runners with "prebuild command cannot
          # use executables built from source". Lint is a dev/PR concern, not a
          # release concern — strip the plugin so the release build proceeds.
          python3 -c "
          import re, pathlib
          p = pathlib.Path('SolplanetEnergyTracker/Package.swift')
          s = p.read_text()
          s = re.sub(r',\s*plugins:\s*\[[^\]]*\]', '', s)
          # Also drop the SwiftLintPlugins package dependency itself; leaving it
          # pulls the SwiftLintBinary artifactbundle, which crashes SwiftPM
          # (SIGTRAP) under a universal '--arch arm64 --arch x86_64' build.
          s = re.sub(r'^\s*\.package\(url:\s*\"https://github.com/SimplyDanny/SwiftLintPlugins\".*\n', '', s, flags=re.MULTILINE)
          p.write_text(s)
          "
          echo "--- Patched Package.swift ---"
          cat SolplanetEnergyTracker/Package.swift

      - name: Build app bundle
        env:
          BUNDLE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          ./scripts/build-app-bundle.sh
          echo "✅ Build completed"

      - name: Create release artifact
        # `ditto -c -k --keepParent` preserves the bundle structure AND the
        # ad-hoc signature; a plain `zip` does not.
        run: |
          cd dist
          ditto -c -k --keepParent "Solplanet Battery Energy Tracker.app" "Solplanet-Energy-Tracker.zip"
          shasum -a 256 "Solplanet-Energy-Tracker.zip" > "Solplanet-Energy-Tracker.zip.sha256"
          echo "SHA256:"
          cat "Solplanet-Energy-Tracker.zip.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          generate_release_notes: true
          files: |
            dist/Solplanet-Energy-Tracker.zip
            dist/Solplanet-Energy-Tracker.zip.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute SHA256 for Homebrew
        id: sha
        run: |
          SHA=$(shasum -a 256 dist/Solplanet-Energy-Tracker.zip | awk '{print $1}')
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"
          echo "SHA256: ${SHA}"

      - name: Summary
        run: |
          echo "🎉 Release ${{ github.ref_name }} published"
          echo ""
          echo "⚠️  Ad-hoc signed build (no Apple notarization)"
          echo "   Installed via the tap with --no-quarantine; the app also strips"
          echo "   its own quarantine xattr at launch as a defensive fallback."

    outputs:
      version: ${{ steps.version.outputs.version }}
      sha256: ${{ steps.sha.outputs.sha256 }}

  update-tap:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout homebrew-tap
        uses: actions/checkout@v5
        with:
          repository: ealliaume/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update cask file
        run: |
          CASK="Casks/solplanet-energy-tracker.rb"
          [ -f "$CASK" ] || { echo "$CASK missing in tap"; exit 1; }

          sed -i "s/version \".*\"/version \"${{ needs.release.outputs.version }}\"/" "$CASK"
          sed -i "s/sha256 \".*\"/sha256 \"${{ needs.release.outputs.sha256 }}\"/" "$CASK"

          grep -q "version \"${{ needs.release.outputs.version }}\"" "$CASK"
          grep -q "sha256 \"${{ needs.release.outputs.sha256 }}\"" "$CASK"

          echo "--- Updated cask ---"
          cat "$CASK"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/solplanet-energy-tracker.rb
          git commit -m "chore: bump solplanet-energy-tracker to ${{ needs.release.outputs.version }}"
          git push
